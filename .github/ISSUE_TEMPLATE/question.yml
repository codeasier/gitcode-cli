name: Question / Support
description: Ask a question or request help using gc
labels: ["question"]
body:
  - type: markdown
    attributes:
      value: |
        Have a question about using `gc`? We're happy to help!

  - type: textarea
    id: question
    attributes:
      label: Your Question
      description: Describe what you'd like to know or what you're having trouble with.
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Context
      description: |
        Any relevant context: commands you ran, error messages, your setup, etc.
        Run `gc --version` and `python --version` and include the output.

  - type: checkboxes
    id: checklist
    attributes:
      label: Before Asking
      options:
        - label: I have read the [README](https://github.com/codeasier/gitcode-cli#readme)
          required: true
        - label: I have searched existing issues for a similar question
          required: true
