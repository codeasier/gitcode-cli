name: Publish to PyPI

on:
  push:
    tags:
      - "v*"

jobs:
  build-and-publish:
    name: Build and publish to PyPI
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/pygitcode
    permissions:
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Validate changelog entry
        run: |
          python - <<'PY'
          from pathlib import Path
          import re

          version = "${{ steps.version.outputs.VERSION }}"
          lines = Path("CHANGELOG.md").read_text(encoding="utf-8").splitlines()
          pattern = re.compile(rf"^## \[{re.escape(version)}\]\b")

          start = None
          for i, line in enumerate(lines):
              if pattern.match(line):
                  start = i + 1
                  break
          if start is None:
              raise SystemExit(f"Version {version} not found in CHANGELOG.md")

          end = len(lines)
          for i in range(start, len(lines)):
              if lines[i].startswith("## "):
                  end = i
                  break

          body = "\n".join(lines[start:end]).strip()
          if not body:
              raise SystemExit(f"No release notes found for version {version} in CHANGELOG.md")
          PY

      - name: Write version to __init__.py
        run: |
          sed -i 's/^__version__ = .*/__version__ = "'"${{ steps.version.outputs.VERSION }}"'"/' src/gitcode_cli/__init__.py
          echo "Updated __init__.py:"
          cat src/gitcode_cli/__init__.py

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          pip install build

      - name: Build package
        run: python -m build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: build-and-publish
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Extract release notes from changelog
        run: |
          python - <<'PY'
          from pathlib import Path
          import re

          version = "${{ steps.version.outputs.VERSION }}"
          lines = Path("CHANGELOG.md").read_text(encoding="utf-8").splitlines()
          pattern = re.compile(rf"^## \[{re.escape(version)}\]\b")

          start = None
          for i, line in enumerate(lines):
              if pattern.match(line):
                  start = i + 1
                  break
          if start is None:
              raise SystemExit(f"Version {version} not found in CHANGELOG.md")

          end = len(lines)
          for i in range(start, len(lines)):
              if lines[i].startswith("## "):
                  end = i
                  break

          body = "\n".join(lines[start:end]).strip()
          if not body:
              raise SystemExit(f"No release notes found for version {version} in CHANGELOG.md")

          Path("RELEASE_NOTES.md").write_text(body + "\n", encoding="utf-8")
          PY

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          body_path: RELEASE_NOTES.md
